services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mega}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mega}
      POSTGRES_DB: ${POSTGRES_DB:-megaai}
    ports: ["5434:5432"]  # 5432/5433 taken by other projects; containers use postgres:5432 internally
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mega}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python scripts/seed_corpus.py &&
             uv run python scripts/embed_corpus.py || true &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports: ["8001:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mega:mega@postgres:5432/megaai
      DATABASE_URL_SYNC: postgresql://mega:mega@postgres:5432/megaai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: 
      - ".:/app"
      - "/app/.venv"
    working_dir: /app

  worker:
    build: .
    command: uv run celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mega:mega@postgres:5432/megaai
      DATABASE_URL_SYNC: postgresql://mega:mega@postgres:5432/megaai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: 
      - ".:/app"
      - "/app/.venv"
    working_dir: /app

  adminer:
    image: adminer:4
    ports: ["8080:8080"]
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres: {condition: service_healthy}

volumes:
  pgdata:
